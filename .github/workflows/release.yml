name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: combat-scribe

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/release/${{ env.BINARY_NAME }}.exe" staging/
          Compress-Archive -Path staging/* -DestinationPath "${{ env.BINARY_NAME }}-${{ github.ref_name }}-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: "${{ env.BINARY_NAME }}-${{ github.ref_name }}-windows-x86_64.zip"

  # ── macOS (universal binary) ─────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p staging
          lipo -create \
            target/x86_64-apple-darwin/release/${{ env.BINARY_NAME }} \
            target/aarch64-apple-darwin/release/${{ env.BINARY_NAME }} \
            -output staging/${{ env.BINARY_NAME }}
          chmod +x staging/${{ env.BINARY_NAME }}

      - name: Create DMG
        run: |
          DMG_NAME="${{ env.BINARY_NAME }}-${{ github.ref_name }}-macos-universal.dmg"
          hdiutil create -volname "${{ env.BINARY_NAME }}" \
            -srcfolder staging \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: "${{ env.BINARY_NAME }}-${{ github.ref_name }}-macos-universal.dmg"

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libvulkan-dev \
            zstd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          tar cf - -C target/release "${{ env.BINARY_NAME }}" | \
            zstd -19 -o "${{ env.BINARY_NAME }}-${{ github.ref_name }}-linux-x86_64.tar.zst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: "${{ env.BINARY_NAME }}-${{ github.ref_name }}-linux-x86_64.tar.zst"

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*

# Consumable database for CombatScribe.
#
# This file is the single source of truth for consumable item classification.
# build.rs compiles it into an optimised static lookup table at build time.
#
# To add a new consumable:
#   1. Add the item name to the appropriate [[category]] section below
#   2. Run `cargo build` — the lookup table regenerates automatically
#
# Items are matched by exact name from SuperWoW "uses" lines (after
# stripping "on Target" suffixes). Names use SuperWoW's apostrophe-stripped
# form (e.g. "Medivhs Merlot" not "Medivh's Merlot").
#
# `buff_names` (optional): combat log buff names that differ from the item
# name.  Many consumables produce buffs with the same name as the item
# (e.g. "Elixir of the Mongoose" → "Elixir of the Mongoose"), but some
# produce distinctly-named buffs (e.g. "Mighty Rage Potion" → "Mighty Rage").
# These entries let the timeline correctly associate aura intervals with
# their consumable category for bar rendering.

# Items in "uses" lines that are NOT consumables (toys, trinkets, mounts, etc.)
[ignored]
items = [
    "MOLL-E, Remote Mail Terminal",
    "Goblin Brainwashing Device",
    "Conjured Mana Orange",
    "Conjured Crystal Water",
    "Conjured Mana Strudel",
    "Morning Glory Dew",
    "Ripe Tel'Abim Banana",
    "Juicy Striped Melon",

# Instance database for CombatScribe.
#
# This file is the single source of truth for raid and dungeon detection.
# build.rs compiles it into optimised static lookup tables at build time.
#
# To add a new instance or update an existing one:
#   1. Add/edit the [[raid]] section below
#   2. Run `cargo build` — the lookup tables regenerate automatically
#
# Data extracted from Turtle WoW database (00073_fulldb.sql) and
# instance scripts at ~/src/turtle-wow/.../src/scripts/dungeons/.

# ── Zone Aliases ─────────────────────────────────────────────────────────────
# Maps addon-reported zone names to canonical raid names.
[zone_aliases]
"ahn'qiraj" = "Ahn'Qiraj Temple"
"black morass" = "Black Morass"
"karazhan" = "Lower Karazhan"
"karazhan crypt" = "Karazhan Crypt"
"scarlet citadel" = "Scarlet Citadel"
"stormwind vault" = "Stormwind Vault"
"the stockade" = "Stormwind Vault"
"the upper necropolis" = "Naxxramas"
"tower of karazhan" = "Upper Karazhan"

# ── Non-Raid Overworld Zones ─────────────────────────────────────────────────
# Zones that should never be treated as raid instances.
[overworld]
zones = [
    "blackrock mountain",
    "blood ring",
    "burning steppes",
    "caverns of time",
    "darnassus",
    "deadwind pass",
    "dustwallow marsh",
    "eastern plaguelands",
    "gates of ahn'qiraj",
    "hyjal",
    "ironforge",
    "orgrimmar",
    "searing gorge",
    "silithus",
    "stormwind city",
    "stranglethorn vale",
    "swamp of sorrows",
    "thunder bluff",
    "undercity",
]


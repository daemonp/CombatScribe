# Raid instance database for CombatScribe.
#
# This file is the single source of truth for raid/instance detection.
# build.rs compiles it into optimised static lookup tables at build time.
#
# To add a new raid or update an existing one:
#   1. Add/edit the [[raid]] section below
#   2. Run `cargo build` — the lookup tables regenerate automatically
#
# Data originally extracted from Turtle WoW database (00073_fulldb.sql).

# ── Zone Aliases ─────────────────────────────────────────────────────────────
# Maps addon-reported zone names to canonical raid names.
[zone_aliases]
"ahn'qiraj" = "Ahn'Qiraj Temple"
"karazhan" = "Lower Karazhan"
"the upper necropolis" = "Naxxramas"
"tower of karazhan" = "Upper Karazhan"

# ── Non-Raid Overworld Zones ─────────────────────────────────────────────────
# Zones that should never be treated as raid instances.
[overworld]
zones = [
    "blackrock mountain",
    "burning steppes",
    "caverns of time",
    "darnassus",
    "deadwind pass",
    "dustwallow marsh",
    "eastern plaguelands",
    "gates of ahn'qiraj",
    "hyjal",
    "ironforge",
    "orgrimmar",
    "searing gorge",
    "silithus",
    "stormwind city",
    "stranglethorn vale",
    "swamp of sorrows",
    "thunder bluff",
    "undercity",
]

